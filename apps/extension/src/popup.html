<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spool</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header headerRow">
        <div>
          <p class="eyebrow">Spool</p>
          <h1>Record a video</h1>
        </div>
        <a
          id="homeLink"
          class="iconButton"
          href="http://localhost:3000"
          target="_blank"
          rel="noreferrer"
          title="Open Spool home"
          aria-label="Open Spool home"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-6h-5v6H5a1 1 0 0 1-1-1z"
              fill="currentColor"
            />
          </svg>
        </a>
      </header>

      <form id="recording-form" class="form">
        <input id="source" name="source" type="hidden" value="tab" />

        <section class="panel">
          <p class="sectionLabel">What to record</p>
          <div class="sourceStack">
            <button class="sourceButton" type="button" data-source-button="tab">
              <span class="sourceTitle">Current tab</span>
              <span class="sourceHint">Fastest option for demos and walkthroughs</span>
            </button>
            <button class="sourceButton" type="button" data-source-button="window">
              <span class="sourceTitle">Chrome window</span>
              <span class="sourceHint">Use the Chrome picker to capture one window</span>
            </button>
            <button class="sourceButton" type="button" data-source-button="screen">
              <span class="sourceTitle">Entire screen</span>
              <span class="sourceHint">Capture everything visible on your display</span>
            </button>
          </div>
        </section>

        <section class="toggleCard">
          <div class="toggleRow">
            <div>
              <p class="toggleTitle">Webcam</p>
              <p class="toggleHint">Add a camera overlay to the recording</p>
            </div>
            <label class="switch">
              <input id="webcam" name="webcam" type="checkbox" />
              <span class="switchTrack"></span>
            </label>
          </div>

          <label id="cameraDeviceField" class="field">
            <span>Camera device</span>
            <select id="cameraDeviceId" name="cameraDeviceId"></select>
          </label>
        </section>

        <section class="toggleCard">
          <div class="toggleRow">
            <div>
              <p class="toggleTitle">Microphone</p>
              <p class="toggleHint">Select which mic to use for narration</p>
            </div>
            <label class="switch">
              <input id="microphone" name="microphone" type="checkbox" checked />
              <span class="switchTrack"></span>
            </label>
          </div>

          <label id="microphoneDeviceField" class="field">
            <span>Microphone device</span>
            <select id="microphoneDeviceId" name="microphoneDeviceId"></select>
          </label>
        </section>

        <section class="panel">
          <p class="sectionLabel">Saving</p>
          <p class="saveHint">Recordings are saved automatically to <strong>Downloads/Spool</strong>.</p>
        </section>

        <button id="submit-button" class="primaryButton" type="submit">Start recording</button>
      </form>

      <section id="status" class="status"></section>
    </main>

    <script src="./popup.js" type="module"></script>
  </body>
</html>
