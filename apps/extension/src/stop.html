<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stop recording</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header headerRow">
        <div>
          <p class="eyebrow">Spool</p>
          <h1>Stopping recording</h1>
        </div>
        <a
          id="homeLink"
          class="iconButton"
          href="http://localhost:3000"
          target="_blank"
          rel="noreferrer"
          title="Open Spool home"
          aria-label="Open Spool home"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-6h-5v6H5a1 1 0 0 1-1-1z"
              fill="currentColor"
            />
          </svg>
        </a>
      </header>
      <section id="status" class="status">Sending stop signal...</section>
    </main>

    <script src="./stop.js" type="module"></script>
  </body>
</html>
